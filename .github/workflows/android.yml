name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'  # Замените на версию вашего проекта

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev

      - name: Install Fyne CLI
        run: go install fyne.io/fyne/v2/cmd/fyne@latest

      - name: Setup Android SDK and NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-30 build-tools;30.0.3 ndk;23.1.7779620'
          # Можно изменить версии под свои нужды

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Build APK
        run: fyne package -os android -appID com.yourcompany.studyflow -icon icon.png
        # Укажите правильный appID и путь к иконке (если иконка есть)

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: StudyFlow.apk