name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'      # Укажите версию Go вашего проекта

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev

      - name: Install Fyne CLI
        run: |
          go install fyne.io/tools/cmd/fyne@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Setup Android SDK and NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-30 build-tools;30.0.3 ndk;23.1.7779620'

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Build APK
        run: |
          if [ -f "icon.png" ]; then
            fyne package -os android -appID com.yourcompany.studyflow -icon icon.png
          else
            fyne package -os android -appID com.yourcompany.studyflow
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: StudyFlow.apk